<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Math Olympiad Forum</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="onKatex()"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e29;
    --border:#242836;--border2:#2e3347;
    --text:#e8eaf0;--text2:#9aa0b8;--text3:#5c6278;
    --primary:#5cb87a;--green:#5cb87a;--red:#e06c75;--accent:#3fa85f;
    --card-bg:#13161e;--card-hover:#181c28;
    --badge-bg:#1e2a20;--badge-text:#5cb87a;
    --badge2-bg:#1e2a20;--badge2-text:#5cb87a;
    --shadow:0 1px 3px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.3);
    --shadow-lg:0 8px 32px rgba(0,0,0,.5);
    --radius:10px;
    --font-body:'DM Sans',sans-serif;
    --font-display:'Lora',serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  html.light {
    --bg:#f4f5f8;--bg2:#fff;--bg3:#eef0f5;
    --border:#dde0ea;--border2:#cdd1de;
    --text:#1a1d2e;--text2:#505672;--text3:#909ab8;
    --primary:#28a152;--green:#28a152;--red:#c0392b;--accent:#1e8040;
    --card-bg:#fff;--card-hover:#f8f9fc;
    --badge-bg:#e5f5ec;--badge-text:#28a152;
    --badge2-bg:#e5f5ec;--badge2-text:#28a152;
    --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.06);
    --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;transition:background .2s,color .2s}

  header{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--border);box-shadow:var(--shadow)}
  .header-inner{max-width:900px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
  .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .logo h1{font-family:var(--font-display);font-size:1.15rem;font-weight:600;color:var(--text);letter-spacing:-.01em}
  .header-actions{display:flex;align-items:center;gap:12px}
  .user-badge{font-size:12.5px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 12px}

  .theme-toggle{display:flex;align-items:center;gap:8px;color:var(--text2);font-size:13px}
  .switch{position:relative;width:40px;height:22px;cursor:pointer}
  .switch input{opacity:0;width:0;height:0}
  .switch-track{position:absolute;inset:0;background:var(--border2);border-radius:11px;transition:background .2s}
  .switch input:checked~.switch-track{background:var(--primary)}
  .switch-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
  .switch input:checked~.switch-thumb{transform:translateX(18px)}

  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;font-family:var(--font-body);font-size:13.5px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;text-decoration:none}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
  .btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
  .btn-ghost:hover{background:var(--bg3);color:var(--text)}
  .btn-link{background:none;border:none;color:var(--primary);font-size:13px;padding:2px 0;cursor:pointer;font-family:var(--font-body)}
  .btn-link:hover{text-decoration:underline}
  .btn-sm{padding:6px 12px;font-size:12.5px}
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}

  /* Google button */
  .btn-google{background:var(--bg3);color:var(--text);border:1px solid var(--border2);width:100%;justify-content:center;padding:10px 16px;font-size:14px;border-radius:9px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .btn-google:hover{background:var(--card-hover);border-color:var(--primary)}
  .divider{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:12px;margin:14px 0}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

  main{max-width:900px;margin:0 auto;padding:28px 24px}

  .loading-state{text-align:center;padding:48px;color:var(--text3)}
  .loading-spinner{width:28px;height:28px;border:3px solid var(--border2);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-banner{background:rgba(224,108,117,.1);border:1px solid var(--red);border-radius:8px;padding:12px 16px;color:var(--red);font-size:13.5px;margin-bottom:16px}

  .breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text3);margin-bottom:20px}
  .breadcrumb a{color:var(--text2);text-decoration:none}
  .breadcrumb a:hover{color:var(--primary)}

  .search-wrap{position:relative;margin-bottom:20px}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
  .search-input{width:100%;padding:10px 36px 10px 38px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;transition:border-color .15s}
  .search-input:focus{border-color:var(--primary)}
  .search-input::placeholder{color:var(--text3)}
  .search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;padding:3px;border-radius:4px;display:flex;align-items:center}
  .search-clear:hover{color:var(--text)}

  .tabs-list{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:4px;width:fit-content;margin-bottom:20px}
  .tab-btn{padding:7px 18px;border-radius:6px;border:none;font-family:var(--font-body);font-size:13.5px;font-weight:500;cursor:pointer;background:transparent;color:var(--text2);transition:all .15s}
  .tab-btn.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(92,184,122,.3)}
  .tab-btn:not(.active):hover{background:var(--bg3);color:var(--text)}

  .topic-header{padding:24px 0 16px;margin-bottom:4px;border-bottom:1px solid var(--border)}
  .topic-header-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .topic-header-left{display:flex;align-items:center;gap:12px}
  .topic-icon-big{font-size:2rem;line-height:1}
  .topic-name-big{font-family:var(--font-display);font-size:1.5rem;font-weight:700}
  .topic-desc-small{font-size:13.5px;color:var(--text2);margin-top:3px}

  .topic-layout{display:grid;grid-template-columns:200px 1fr;gap:20px;align-items:start;margin-top:20px}
  @media(max-width:680px){.topic-layout{grid-template-columns:1fr}}

  .sidebar{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;position:sticky;top:74px;box-shadow:var(--shadow)}
  .sidebar-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:10px}
  .subtopic-btn{display:block;width:100%;text-align:left;padding:8px 10px;border-radius:7px;border:none;background:transparent;color:var(--text2);font-family:var(--font-body);font-size:13px;cursor:pointer;transition:all .15s;margin-bottom:2px}
  .subtopic-btn:hover{background:var(--bg3);color:var(--text)}
  .subtopic-btn.active{background:var(--primary);color:#fff}

  .question-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);display:flex;overflow:hidden}
  .question-card:hover{background:var(--card-hover);border-color:var(--border2);transform:translateY(-1px);box-shadow:var(--shadow-lg)}
  .vote-col{display:flex;flex-direction:column;align-items:center;gap:4px;padding:18px 14px;min-width:58px;border-right:1px solid var(--border)}
  .vote-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:6px;transition:all .15s;display:flex;align-items:center}
  .vote-btn.voted-up{color:var(--green)}
  .vote-btn.voted-down{color:var(--red)}
  .vote-score{font-weight:700;font-size:15px;color:var(--text);line-height:1;font-family:var(--font-mono)}
  .vote-score.positive{color:var(--green)}
  .vote-score.negative{color:var(--red)}
  .intuition-count{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--text3);margin-top:6px}
  .card-content{flex:1;padding:16px 18px;min-width:0}
  .card-title{font-family:var(--font-display);font-size:1.05rem;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.4}
  .card-about{font-size:13.5px;color:var(--text2);margin-bottom:10px}
  .card-about .label{font-weight:600;color:var(--text3)}
  .tags{display:flex;flex-wrap:wrap;gap:6px}
  .tag{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
  .tag-primary{background:var(--badge-bg);color:var(--badge-text)}
  .tag-secondary{background:var(--badge2-bg);color:var(--badge2-text)}
  .card-meta{font-size:12px;color:var(--text3);margin-top:10px}

  .back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;color:var(--text2);font-size:13.5px;font-family:var(--font-body);padding:6px 0;transition:color .15s;margin-bottom:16px}
  .back-btn:hover{color:var(--text)}
  .detail-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:24px;box-shadow:var(--shadow);overflow:hidden}
  .detail-card-inner{display:flex}
  .detail-content{flex:1;padding:22px 24px;min-width:0}
  .detail-title{font-family:var(--font-display);font-size:1.5rem;font-weight:700;margin-bottom:10px;line-height:1.3}
  .detail-about{color:var(--text2);margin-bottom:14px}
  .detail-meta{font-size:12.5px;color:var(--text3)}

  .sort-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
  .sort-btns{display:flex;gap:6px}
  .sort-btn{padding:5px 14px;border-radius:7px;border:1px solid var(--border);font-size:12.5px;font-family:var(--font-body);cursor:pointer;background:transparent;color:var(--text2);transition:all .15s}
  .sort-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
  .sort-btn:not(.active):hover{background:var(--bg3);color:var(--text)}

  .i-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;box-shadow:var(--shadow);overflow:hidden}
  .i-card-inner{display:flex}
  .i-content{flex:1;padding:16px 18px;min-width:0}
  .i-label{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:3px}
  .i-statement{font-family:var(--font-display);font-size:1rem;font-weight:600;color:var(--text);margin-bottom:12px;line-height:1.4}
  .i-explanation{color:var(--text2);font-size:14px;line-height:1.65;white-space:pre-wrap}
  .i-example{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:12px;margin-top:12px}
  .i-links{margin-top:10px;display:flex;flex-direction:column;gap:4px}
  .i-link{font-size:13px;color:var(--primary);text-decoration:none}
  .i-link:hover{text-decoration:underline}
  .i-footer{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);font-size:12px;color:var(--text3);flex-wrap:wrap;gap:8px}
  .comment-btn{display:inline-flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;color:var(--text2);font-size:12.5px;font-family:var(--font-body);padding:4px 8px;border-radius:6px;transition:all .15s}
  .comment-btn:hover{background:var(--bg3);color:var(--text)}
  .comments-section{border-top:1px solid var(--border);padding:14px 18px;background:var(--bg3);display:none}
  .comments-section.open{display:block}
  .comment-item{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:10px 12px;margin-bottom:8px}
  .comment-text{font-size:13.5px;color:var(--text)}
  .comment-meta{font-size:11.5px;color:var(--text3);margin-top:4px}
  .comment-form{display:flex;gap:8px;margin-top:10px;align-items:flex-start}
  .comment-input{flex:1;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font-body);font-size:13.5px;resize:none;min-height:60px;outline:none;transition:border-color .15s}
  .comment-input:focus{border-color:var(--primary)}
  .comment-input::placeholder{color:var(--text3)}

  .form-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;box-shadow:var(--shadow);margin-top:24px}
  .form-title{font-family:var(--font-display);font-size:1.05rem;font-weight:600;margin-bottom:18px}
  .form-group{margin-bottom:16px}
  .form-label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px}
  .form-input,.form-textarea,.form-select{width:100%;padding:9px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;transition:border-color .15s}
  .form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--primary)}
  .form-input::placeholder,.form-textarea::placeholder{color:var(--text3)}
  .form-textarea{resize:vertical;min-height:90px}
  .form-select{appearance:none;cursor:pointer}
  .word-count{font-size:11.5px;color:var(--text3);text-align:right;margin-top:4px}
  .word-count.over{color:var(--red)}
  .link-input-row{display:flex;gap:8px}
  .link-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
  .link-item{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:13px}
  .link-item a{flex:1;color:var(--primary);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .remove-link-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:2px;transition:color .15s}
  .remove-link-btn:hover{color:var(--red)}
  .form-divider{border:none;border-top:1px solid var(--border);margin:20px 0}

  .empty-state{text-align:center;padding:48px 24px;color:var(--text3);font-size:14px}
  .empty-state-icon{font-size:32px;margin-bottom:12px}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:24px}
  .modal-overlay.open{display:flex}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:28px 28px 24px;max-width:580px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:modalIn .2s ease}
  @keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .modal-header{margin-bottom:20px}
  .modal-title{font-family:var(--font-display);font-size:1.15rem;font-weight:700}
  .modal-subtitle{font-size:13px;color:var(--text2);margin-top:4px}
  .modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
  .auth-tabs{display:flex;gap:4px;margin-bottom:18px;background:var(--bg3);border-radius:8px;padding:3px}
  .auth-tab{flex:1;padding:7px;border-radius:6px;border:none;font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer;background:transparent;color:var(--text2);transition:all .15s}
  .auth-tab.active{background:var(--bg2);color:var(--text);box-shadow:var(--shadow)}

  .spoiler{display:inline;cursor:pointer;background:var(--text);color:transparent;border-radius:3px;padding:1px 3px;transition:all .2s;user-select:none}
  .spoiler.revealed{background:transparent;color:inherit}
  .hidden{display:none!important}
  .tab-content{display:none}
  .tab-content.active{display:block}
  .q-count{font-size:12.5px;color:var(--text3);margin-bottom:12px}

  @keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  @media(max-width:600px){
    .header-inner{padding:12px 16px}
    main{padding:20px 16px}
    .logo h1{font-size:.95rem}
    .detail-title{font-size:1.2rem}
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="index.html">
      <div class="logo-icon">∑</div>
      <h1>Math Olympiad Intuition Forum</h1>
    </a>
    <div class="header-actions">
      <div class="theme-toggle">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <!-- FIX: removed hardcoded checked; set correctly by initTheme() -->
        <label class="switch"><input type="checkbox" id="themeToggle" /><span class="switch-track"></span><span class="switch-thumb"></span></label>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </div>
      <span class="user-badge hidden" id="userBadge"></span>
      <button class="btn btn-ghost btn-sm" id="authBtn">Log in</button>
      <button class="btn btn-primary btn-sm" id="postQuestionBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Post a Question
      </button>
    </div>
  </div>
</header>

<!-- LIST VIEW -->
<main id="listView">
  <div class="breadcrumb">
    <a href="index.html">Home</a>
    <span>›</span>
    <span id="breadcrumbCurrent">Topic</span>
  </div>

  <div class="topic-header">
    <div class="topic-header-row">
      <div class="topic-header-left">
        <span class="topic-icon-big" id="topicIcon"></span>
        <div>
          <div class="topic-name-big" id="topicName"></div>
          <div class="topic-desc-small" id="topicDesc"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="topic-layout">
    <div class="sidebar">
      <div class="sidebar-title">Subtopics</div>
      <div id="subtopicList"></div>
    </div>
    <div>
      <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px">
        <!-- FIX: type=text, autocomplete off, clear button, bound via JS -->
        <div class="search-wrap" style="flex:1;min-width:160px;margin-bottom:0">
          <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-input" id="questionSearch" type="text" placeholder="Search questions..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
          <button class="search-clear hidden" id="searchClear" title="Clear">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="tabs-list" style="margin-bottom:0">

// FIX: loadProfile as a standalone function with first-time profile creation for Google users
async function loadProfile(user) {
  try {
    const { data, error } = await db.from('profiles').select('username').eq('id', user.id).maybeSingle();
    if (error) { console.error('[profile]', error.message); currentProfile = null; updateAuthUI(); return; }
    if (data) { currentProfile = data; updateAuthUI(); return; }
    // No profile yet — auto-create one (Google sign-in first time)
    const base = (user.user_metadata?.full_name || user.user_metadata?.name || user.email.split('@')[0])
      .replace(/[^a-zA-Z0-9_]/g, '_').slice(0, 16);
    const uname = base + '_' + Math.random().toString(36).slice(2, 6);
    const { data: ins, error: insErr } = await db.from('profiles').insert({ id: user.id, username: uname }).select('username').maybeSingle();
    if (insErr) {
      // Race condition: another tab may have created it already
      const { data: retry } = await db.from('profiles').select('username').eq('id', user.id).maybeSingle();
      currentProfile = retry ?? null;
    } else {
      currentProfile = ins;
    }
    updateAuthUI();
  } catch(e) { console.error('[loadProfile]', e); }
}

function updateAuthUI() {
  const btn = document.getElementById('authBtn');
  const badge = document.getElementById('userBadge');
  if (!btn) return;
  if (currentUser) {
    const name = currentProfile?.username || currentUser.email?.split('@')[0] || 'You';
    btn.textContent = 'Log out';
    btn.onclick = () => db.auth.signOut().then(() => showToast('Logged out.', 'success'));
    badge.textContent = name; badge.classList.remove('hidden');
  } else {
    btn.textContent = 'Log in'; btn.onclick = openAuthModal;
    badge.classList.add('hidden');
  }
}

// ── AUTH MODAL ────────────────────────────────────────────
function openAuthModal() {
  document.getElementById('authModalOverlay').classList.add('open');

}
function closeAuthModal() {
  document.getElementById('authModalOverlay').classList.remove('open');
  // FIX: form.reset() properly clears fields and browser autofill state
  document.getElementById('authForm').reset();
  document.getElementById('authError').style.display = 'none';
  document.getElementById('authSuccess').style.display = 'none';
  const btn = document.getElementById('authSubmitBtn');
  btn.disabled = false;
  btn.textContent = authMode === 'login' ? 'Log in' : 'Create account';
}
function switchAuthTab(mode) {
  authMode = mode;
  document.getElementById('loginTab').classList.toggle('active', mode === 'login');
  document.getElementById('signupTab').classList.toggle('active', mode === 'signup');
  document.getElementById('authSubmitBtn').textContent = mode === 'login' ? 'Log in' : 'Create account';
  document.getElementById('authError').style.display = 'none';
  document.getElementById('authSuccess').style.display = 'none';
  const uw = document.getElementById('usernameWrap');
  if (uw) uw.classList.toggle('hidden', mode === 'login');
  // FIX: setAttribute on the actual input (not JS property assignment)
  document.getElementById('authPassword').setAttribute('autocomplete', mode === 'login' ? 'current-password' : 'new-password');
}
function showAuthMsg(type, msg) {
  const el = document.getElementById(type === 'error' ? 'authError' : 'authSuccess');
  const other = document.getElementById(type === 'error' ? 'authSuccess' : 'authError');
  el.textContent = msg; el.style.display = 'block'; other.style.display = 'none';
}
async function handleAuthSubmit() {
  const email = document.getElementById('authEmail').value.trim();
  const pass  = document.getElementById('authPassword').value;
  const btn   = document.getElementById('authSubmitBtn');
  if (!email || !pass) { showAuthMsg('error','Please fill in both fields.'); return; }
  if (pass.length < 6) { showAuthMsg('error','Password must be at least 6 characters.'); return; }
  btn.disabled = true; btn.textContent = authMode === 'login' ? 'Logging in...' : 'Creating account...';
  if (authMode === 'login') {
    // FIX: friendlyError instead of raw Supabase messages
    const { error } = await db.auth.signInWithPassword({ email, password: pass });
    if (error) { showAuthMsg('error', friendlyError(error.message)); btn.disabled = false; btn.textContent = 'Log in'; return; }
    closeAuthModal();
  } else {
    const username = document.getElementById('authUsername')?.value.trim();
    if (!username) { showAuthMsg('error','Please choose a username.'); btn.disabled = false; btn.textContent = 'Create account'; return; }
    if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) { showAuthMsg('error','Username: 3–20 chars, letters/numbers/underscores only.'); btn.disabled = false; btn.textContent = 'Create account'; return; }
    const { data: existing } = await db.from('profiles').select('id').eq('username', username).maybeSingle();
    if (existing) { showAuthMsg('error','Username already taken.'); btn.disabled = false; btn.textContent = 'Create account'; return; }
    const { data: sd, error } = await db.auth.signUp({ email, password: pass, options: { data: { username } } });
    if (error) { showAuthMsg('error', friendlyError(error.message)); btn.disabled = false; btn.textContent = 'Create account'; return; }
    if (sd?.session) { closeAuthModal(); }
    else { showAuthMsg('success','✅ Check your email to confirm, then log in.'); btn.disabled = false; btn.textContent = 'Create account'; }
  }
}
function friendlyError(msg) {
  if (!msg) return 'Something went wrong. Please try again.';
  if (msg.includes('Invalid login credentials')) return 'Incorrect email or password.';
  if (msg.includes('Email not confirmed')) return 'Please confirm your email before logging in.';
  if (msg.includes('User already registered')) return 'An account with this email already exists.';
  if (msg.includes('Password should be')) return 'Password must be at least 6 characters.';
  return msg;
}

let toastTimer = null;
function showToast(msg, type = 'success') {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  clearTimeout(toastTimer);
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.cssText = `position:fixed;bottom:24px;right:24px;z-index:999;background:var(--bg2);border:1px solid ${type==='success'?'var(--green)':'var(--red)'};border-radius:10px;padding:12px 18px;font-size:13.5px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;animation:toastIn .25s ease;max-width:340px;color:${type==='success'?'var(--green)':'var(--red)'}`;
  t.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span> ${msg}`;
  document.body.appendChild(t);
  toastTimer = setTimeout(() => t.remove(), 3500);
}

function timeAgo(ts) {
  const d=Date.now()-new Date(ts).getTime(),m=Math.floor(d/60000),h=Math.floor(d/3600000),dy=Math.floor(d/86400000),w=Math.floor(d/604800000);
  if(m<1)return'just now';if(m<60)return`${m}m ago`;if(h<24)return`${h}h ago`;if(dy<7)return`${dy}d ago`;return`${w}w ago`;
}
function processText(raw) {
  if(!raw)return'';
  return raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(/\|\|([^|]+)\|\|/g,(_,c)=>`<span class="spoiler" onclick="this.classList.toggle('revealed')">${c}</span>`);
}

// FIX: all event listeners bound here, not as inline onclick attrs
function bindEvents() {

  document.getElementById('authModalOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeAuthModal(); });

    btn.addEventListener('click', () => switchSort(btn));

  // Detail tabs

  // Detail sort

    searchClear.classList.toggle('hidden', !searchInput.value);
    renderQuestions();
  });
  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    searchInput.dispatchEvent(new Event('input'));
    searchInput.focus();
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (document.getElementById('authModalOverlay').classList.contains('open')) closeAuthModal();
      else if (document.getElementById('newQModal').classList.contains('open')) closeNewQModal();
      else if (searchInput.value) { searchInput.value = ''; searchInput.dispatchEvent(new Event('input')); }
    }
  });

  window.addEventListener('popstate', () => { if(!getParam('q')) goBack(); });
}

    const { data: tagData, error: tagError } = await db.from('tags').select('id,name').eq('category', TOPIC_NAME);
    if (tagError) { document.getElementById('questionsList').innerHTML=`<div class="error-banner">Error: ${tagError.message}</div>`; return; }
    if (!tagData||!tagData.length) { questions=[]; renderQuestions(); return; }
    const { data: qtData, error: qtError } = await db.from('question_tags').select('question_id').in('tag_id', tagData.map(t=>t.id));
    if (qtError) { document.getElementById('questionsList').innerHTML=`<div class="error-banner">Error: ${qtError.message}</div>`; return; }
    if (!qtData||!qtData.length) { questions=[]; renderQuestions(); return; }
    const qIds = [...new Set(qtData.map(qt=>qt.question_id))];
    const { data, error } = await db.from('questions')
      .select('id,title,about,created_at,question_tags(tags(name,category)),intuitions(id),takeaways(id)')
      .in('id',qIds).order('created_at',{ascending:false});
    if (error) { document.getElementById('questionsList').innerHTML=`<div class="error-banner">Error: ${error.message}</div>`; return; }
    // FIX: safe null-coalescing on all array accesses
    questions = (data||[]).map(q=>({
      id:q.id,title:q.title,about:q.about,
      createdAt:timeAgo(q.created_at),createdAtRaw:q.created_at,
      tags:(q.question_tags||[]).map(qt=>qt.tags?.name).filter(Boolean),
      intuitionCount:(q.intuitions||[]).length,takeawayCount:(q.takeaways||[]).length,upvotes:0,downvotes:0,
    }));
    const voteCounts = await fetchVoteCounts(qIds,'question');
    questions.forEach(q=>{const v=voteCounts[q.id]||{upvotes:0,downvotes:0};q.upvotes=+v.upvotes;q.downvotes=+v.downvotes;});
    if (currentUser) {
      const { data: vd } = await db.from('votes').select('target_id,direction').eq('user_id',currentUser.id).eq('target_type','question').in('target_id',qIds);
      (vd||[]).forEach(v=>{questionVotes[v.target_id]=v.direction;});
    }
    renderQuestions();
  } catch(e) {
    console.error('[loadQuestions]', e);
    document.getElementById('questionsList').innerHTML=`<div class="error-banner">Failed to load questions. Please refresh.</div>`;
  }
}

// ── SORT & RENDER ──────────────────────────────────────────
function switchSort(btn) {
  document.querySelectorAll('.tab-btn[data-sort]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); currentSort=btn.dataset.sort; renderQuestions();
}
function sortItems(items,type) {
  const arr=[...items];
  function rel(x){const s=x.upvotes-x.downvotes,h=(Date.now()-new Date(x.createdAtRaw).getTime())/3600000;return s*.7+(Math.max(0,24-h)/24)*5;}
  if(type==='top') return arr.sort((a,b)=>(b.upvotes-b.downvotes)-(a.upvotes-a.downvotes));
  if(type==='relevance') return arr.sort((a,b)=>rel(b)-rel(a));
  return arr.sort((a,b)=>new Date(b.createdAtRaw)-new Date(a.createdAtRaw));
}
function renderQuestions() {
  const q=document.getElementById('questionSearch').value.trim().toLowerCase();
  const filtered=questions.filter(x=>{
    const matchSub=!activeSubtopic||x.tags.includes(activeSubtopic);
    const matchQ=!q||x.title.toLowerCase().includes(q)||(x.about||'').toLowerCase().includes(q)||x.tags.some(t=>t.toLowerCase().includes(q));
    return matchSub&&matchQ;
  });
  const sorted=sortItems(filtered,currentSort);
  document.getElementById('qCount').textContent=`${sorted.length} question${sorted.length!==1?'s':''}${activeSubtopic?` in ${activeSubtopic}`:''}`;
  const container=document.getElementById('questionsList');
  if(!sorted.length){container.innerHTML=`<div class="empty-state"><div class="empty-state-icon">💭</div>No questions yet${activeSubtopic?` in ${activeSubtopic}`:''}. Be the first!</div>`;return;}
  container.innerHTML=sorted.map(q=>questionCardHTML(q)).join('');
  container.querySelectorAll('.katex-render').forEach(el=>renderLatex(el));
  // FIX: bind card clicks and vote buttons via JS (not inline onclick)
  container.querySelectorAll('.question-card').forEach(card => {
    card.addEventListener('click', () => openQuestion(card.dataset.qid));
  });
  container.querySelectorAll('.vote-btn[data-vid]').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); handleVote(btn.dataset.vid, btn.dataset.vdir, 'q'); });
  });
}
function questionCardHTML(q) {

    db.from('intuitions').select('id,statement,explanation,example_link,example_explanation,created_at,profiles(username),links(url)').eq('question_id',qid).order('created_at',{ascending:false}),
    db.from('takeaways').select('id,content,created_at,profiles(username),links(url)').eq('question_id',qid).order('created_at',{ascending:false}),

  intuitions[qid]=(intData||[]).map(i=>({id:i.id,statement:i.statement,explanation:i.explanation,exampleLink:i.example_link||'',exampleExplanation:i.example_explanation||'',author:i.profiles?.username||'Anonymous',createdAt:timeAgo(i.created_at),createdAtRaw:i.created_at,upvotes:0,downvotes:0,explanationLinks:(i.links||[]).map(l=>l.url),comments:[]}));

// ── EXPAND / COMMENTS ──────────────────────────────────────
const expandState={};
function toggleExpand(id,type){
  const key=type+id;expandState[key]=!expandState[key];
  const list=type==='i'?(intuitions[selectedQuestion.id]||[]):(takeaways[selectedQuestion.id]||[]);
  const item=list.find(x=>x.id===id);if(!item)return;
  const content=type==='i'?item.explanation:item.content,ex=expandState[key];
  const el=document.getElementById((type==='i'?'iexp':'texp')+'-'+id);
  const btn=document.getElementById((type==='i'?'iexpbtn':'texpbtn')+'-'+id);
  if(el){el.innerHTML=processText(ex?content:content.substring(0,300)+'...');renderLatex(el);}
  if(btn)btn.textContent=ex?'Show less':'Show more';
}
function toggleComments(id,type){document.getElementById(`comments-${type}-${id}`)?.classList.toggle('open');}
function addComment(id,type){
  if(!currentUser){openAuthModal();return;}
  const el=document.getElementById(`ctext-${type}-${id}`),text=el?.value.trim();if(!text)return;
  const comment={id:'c'+(++idCounter),text,author:currentProfile?.username||'You',createdAt:'just now'};
  const list=type==='i'?(intuitions[selectedQuestion.id]||[]):(takeaways[selectedQuestion.id]||[]);
  const item=list.find(x=>x.id===id);if(item){if(!item.comments)item.comments=[];item.comments.push(comment);}
  db.from('comments').insert({parent_id:id,parent_type:type==='i'?'intuition':'takeaway',text,author_id:currentUser.id});
  renderDetailItems();
  setTimeout(()=>document.getElementById(`comments-${type}-${id}`)?.classList.add('open'),10);
}

// ── VOTING ─────────────────────────────────────────────────
async function handleVote(id,dir,type){
  if(!currentUser){openAuthModal();return;}
  const vm=type==='q'?questionVotes:type==='i'?intuitionVotes:takeawayVotes;
  const cur=vm[id]??null,next=cur===dir?null:dir;
  const ttype=type==='q'?'question':type==='i'?'intuition':'takeaway';
  const ud=(cur==='up'?-1:0)+(next==='up'?1:0),dd=(cur==='down'?-1:0)+(next==='down'?1:0);
  vm[id]=next;
  const apply=item=>{item.upvotes+=ud;item.downvotes+=dd;};
  if(type==='q'){const q=questions.find(q=>q.id===id);if(q)apply(q);renderQuestions();}
  else if(type==='i'&&selectedQuestion){const i=(intuitions[selectedQuestion.id]||[]).find(x=>x.id===id);if(i)apply(i);renderDetailItems();}
  else if(type==='t'&&selectedQuestion){const t=(takeaways[selectedQuestion.id]||[]).find(x=>x.id===id);if(t)apply(t);renderDetailItems();}
  if(next===null)await db.from('votes').delete().eq('user_id',currentUser.id).eq('target_id',id).eq('target_type',ttype);
  else if(cur===null)await db.from('votes').insert({user_id:currentUser.id,target_id:id,target_type:ttype,direction:next});
  else await db.from('votes').update({direction:next}).eq('user_id',currentUser.id).eq('target_id',id).eq('target_type',ttype);
}

    document.getElementById('pf-statement').addEventListener('input', e=>{formState.statement=e.target.value;updateWordCount();});
    document.getElementById('pf-explanation').addEventListener('input', e=>{formState.explanation=e.target.value;updateWordCount();});
    document.getElementById('pf-exampleLink').addEventListener('input', e=>{formState.exampleLink=e.target.value;});
    document.getElementById('pf-exampleExp').addEventListener('input', e=>{formState.exampleExplanation=e.target.value;});
    document.getElementById('pf-link')?.addEventListener('keydown', e=>{if(e.key==='Enter'){e.preventDefault();addIntLink();}});
    document.getElementById('pf-addlink')?.addEventListener('click', addIntLink);
    document.getElementById('pf-submitInt')?.addEventListener('click', submitIntuition);
    renderLinkList('int');updateWordCount();
  } else {
    document.getElementById('pf-takeaway').value=formState.takeawayContent;
    document.getElementById('pf-takeaway').addEventListener('input', e=>{formState.takeawayContent=e.target.value;});
    document.getElementById('pf-taklink')?.addEventListener('keydown', e=>{if(e.key==='Enter'){e.preventDefault();addTakLink();}});
    document.getElementById('pf-addtaklink')?.addEventListener('click', addTakLink);
    document.getElementById('pf-submitTak')?.addEventListener('click', submitTakeaway);
    renderLinkList('tak');
  }
}
function intuitionFormHTML(){
  const li=!!currentUser;
  return `<div class="form-card"><div class="form-title">Share Your Intuition</div>
    ${!li?`<div class="error-banner">You need to <button class="btn-link" id="loginPromptInt">log in</button> to post an intuition.</div>`:''}
    <div class="form-group"><label class="form-label">Intuition Statement</label><input class="form-input" id="pf-statement" placeholder="e.g. It is composed of many primes" ${!li?'disabled':''} /></div>
    <div class="form-group"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><label class="form-label" style="margin:0">Explanation</label><span class="word-count" id="wordCount">0 / 400 words</span></div>
      <textarea class="form-textarea" id="pf-explanation" style="min-height:110px" ${!li?'disabled':''} placeholder="Explain your intuition... ($LaTeX$ and ||spoiler|| supported)"></textarea></div>
    <div class="form-group"><label class="form-label">Links (optional, max 3)</label>
      <div class="link-input-row"><input class="form-input" id="pf-link" placeholder="https://example.com" style="flex:1" ${!li?'disabled':''} /><button class="btn btn-ghost btn-sm" id="pf-addlink" ${!li?'disabled':''}>Add</button></div>
      <div class="link-list" id="int-links"></div></div>
    <hr class="form-divider"/>
    <div class="form-group"><label class="form-label">Problem Link (optional)</label><input class="form-input" id="pf-exampleLink" placeholder="https://artofproblemsolving.com/..." ${!li?'disabled':''} /></div>
    <div class="form-group"><label class="form-label">Additional Context (optional)</label><textarea class="form-textarea" id="pf-exampleExp" style="min-height:70px" ${!li?'disabled':''} placeholder="Extra notes..."></textarea></div>
    <button class="btn btn-primary" id="pf-submitInt" ${!li?'disabled':''}>Post Intuition</button></div>`;
}
function takeawayFormHTML(){
  const li=!!currentUser;
  return `<div class="form-card"><div class="form-title">Share Your Takeaway</div>
    ${!li?`<div class="error-banner">You need to <button class="btn-link" id="loginPromptTak">log in</button> to post a takeaway.</div>`:''}
    <div class="form-group"><label class="form-label">Your Takeaway</label><textarea class="form-textarea" id="pf-takeaway" style="min-height:130px" ${!li?'disabled':''} placeholder="Share your insights... ($LaTeX$ and ||spoiler|| supported)"></textarea></div>
    <div class="form-group"><label class="form-label">Links (optional)</label>
      <div class="link-input-row"><input class="form-input" id="pf-taklink" placeholder="https://example.com" style="flex:1" ${!li?'disabled':''} /><button class="btn btn-ghost btn-sm" id="pf-addtaklink" ${!li?'disabled':''}>Add</button></div>
      <div class="link-list" id="tak-links"></div></div>
    <button class="btn btn-primary" id="pf-submitTak" ${!li?'disabled':''}>Post Takeaway</button></div>`;
}
function updateWordCount(){
  const el=document.getElementById('pf-explanation'),wc=document.getElementById('wordCount');
  if(!el||!wc)return;
  const c=el.value.trim().split(/\s+/).filter(Boolean).length;
  wc.textContent=`${c} / 400 words`;wc.className='word-count'+(c>400?' over':'');
  const btn=document.getElementById('pf-submitInt');
  if(btn)btn.disabled=c>400||!formState.statement.trim()||!formState.explanation.trim();
}
function addIntLink(){
  const i=document.getElementById('pf-link'),v=i?.value.trim();if(!v)return;
  if(!isValidURL(v)){alert('Valid URL required');return;}
  if(formState.explanationLinks.length>=3){alert('Max 3 links');return;}
  formState.explanationLinks.push(v);i.value='';renderLinkList('int');
}
function removeIntLink(idx){formState.explanationLinks.splice(idx,1);renderLinkList('int');}
function addTakLink(){
  const i=document.getElementById('pf-taklink'),v=i?.value.trim();if(!v)return;
  if(!isValidURL(v)){alert('Valid URL required');return;}
  formState.takeawayLinks.push(v);i.value='';renderLinkList('tak');
}
function removeTakLink(idx){formState.takeawayLinks.splice(idx,1);renderLinkList('tak');}
function renderLinkList(type){
  const c=document.getElementById(type+'-links');if(!c)return;
  const links=type==='int'?formState.explanationLinks:formState.takeawayLinks;
  c.innerHTML=links.map((l,i)=>`<div class="link-item"><a href="${l}" target="_blank" rel="noopener">${l}</a><button class="remove-link-btn" data-rtype="${type}" data-ridx="${i}" title="Remove"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>`).join('');
}
async function submitIntuition(){
  if(!currentUser){openAuthModal();return;}
  const stmt=document.getElementById('pf-statement')?.value.trim(),exp=document.getElementById('pf-explanation')?.value.trim();
  if(!stmt||!exp){alert('Please fill in statement and explanation.');return;}
  if(exp.split(/\s+/).filter(Boolean).length>400){alert('Explanation exceeds 400 words.');return;}
  const btn=document.getElementById('pf-submitInt');btn.disabled=true;btn.textContent='Posting...';
  const{data:d,error:e}=await db.from('intuitions').insert({question_id:selectedQuestion.id,statement:stmt,explanation:exp,example_link:document.getElementById('pf-exampleLink')?.value.trim()||null,example_explanation:document.getElementById('pf-exampleExp')?.value.trim()||null,author_id:currentUser.id}).select('id').single();
  if(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent='Post Intuition';return;}
  if(formState.explanationLinks.length>0&&d)await db.from('links').insert(formState.explanationLinks.map(url=>({parent_id:d.id,parent_type:'intuition',url})));
  Object.assign(formState,{statement:'',explanation:'',explanationLinks:[],exampleLink:'',exampleExplanation:''});
  await loadDetailItems(selectedQuestion.id);renderDetailItems();renderPostForm();
  window.scrollTo({top:document.getElementById('dtab-intuitions').offsetTop-80,behavior:'smooth'});
}
async function submitTakeaway(){
  if(!currentUser){openAuthModal();return;}
  const content=document.getElementById('pf-takeaway')?.value.trim();if(!content){alert('Please write your takeaway.');return;}
  const{data:d,error:e}=await db.from('takeaways').insert({question_id:selectedQuestion.id,content,author_id:currentUser.id}).select('id').single();
  if(e){alert('Error: '+e.message);return;}
  if(formState.takeawayLinks.length>0&&d)await db.from('links').insert(formState.takeawayLinks.map(url=>({parent_id:d.id,parent_type:'takeaway',url})));
  Object.assign(formState,{takeawayContent:'',takeawayLinks:[]});
  await loadDetailItems(selectedQuestion.id);renderDetailItems();renderPostForm();
  window.scrollTo({top:document.getElementById('dtab-takeaways').offsetTop-80,behavior:'smooth'});
}

// ── NEW QUESTION MODAL ─────────────────────────────────────
function openNewQModal(){document.getElementById('newQModal').classList.add('open');}
function closeNewQModal(){
  document.getElementById('newQModal').classList.remove('open');
  document.getElementById('newQTitle').value='';
  document.getElementById('newQAbout').value='';
  document.getElementById('newQSub').value='';
  document.getElementById('newQError').innerHTML='';
  document.getElementById('newQSubmitBtn').disabled=false;
  document.getElementById('newQSubmitBtn').textContent='Post Question';
}
async function submitNewQuestion(){
  const title=document.getElementById('newQTitle').value.trim(),about=document.getElementById('newQAbout').value.trim(),sub=document.getElementById('newQSub').value;
  if(!title||!about){document.getElementById('newQError').innerHTML='<div class="error-banner">Please fill in title and description.</div>';return;}
  const btn=document.getElementById('newQSubmitBtn');btn.disabled=true;btn.textContent='Posting...';
  const{data:qd,error:qe}=await db.from('questions').insert({title,about}).select('id').single();
  if(qe){document.getElementById('newQError').innerHTML=`<div class="error-banner">${qe.message}</div>`;btn.disabled=false;btn.textContent='Post Question';return;}
  for(const name of(sub?[TOPIC_NAME,sub]:[TOPIC_NAME])){
    let{data:tag}=await db.from('tags').select('id').eq('name',name).maybeSingle();
    if(!tag){const{data:nt}=await db.from('tags').insert({name,category:TOPIC_NAME}).select('id').single();tag=nt;}
    if(tag)await db.from('question_tags').insert({question_id:qd.id,tag_id:tag.id});
  }
  closeNewQModal();await loadQuestions();
}
</script>
