<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MINT — Math Olympiad Intuition Forum</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="onKatex()"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0b0c10;--bg2:#0f1116;--bg3:#161820;--bg4:#1c1f2b;--border:#1e2130;--border2:#262a3a;--border3:#303550;--text:#eceef5;--text2:#8e95b0;--text3:#4a5070;--primary:#6ee7a0;--primary2:#3db870;--green:#6ee7a0;--red:#f07070;--gold:#f0c060;--blue:#7ab0f5;--purple:#b090f5;--card-bg:#0f1116;--card-hover:#141720;--shadow:0 1px 3px rgba(0,0,0,.5),0 4px 16px rgba(0,0,0,.4);--shadow-lg:0 8px 40px rgba(0,0,0,.6);--radius:10px;--font-body:'DM Sans',sans-serif;--font-disp:'Playfair Display',Georgia,serif;--font-serif:'Crimson Pro',Georgia,serif;--font-mono:'JetBrains Mono',monospace}
html.light{--bg:#f7f6f1;--bg2:#ffffff;--bg3:#f0ede6;--bg4:#e8e4db;--border:#ddd9d0;--border2:#ccc8be;--border3:#b8b3a8;--text:#1a1814;--text2:#4a4640;--text3:#8a8680;--primary:#1e7a48;--primary2:#155c36;--green:#1e7a48;--red:#c0392b;--card-bg:#ffffff;--card-hover:#faf9f6;--shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.12)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;transition:background .2s,color .2s}
header{position:sticky;top:0;z-index:100;background:rgba(11,12,16,.9);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
html.light header{background:rgba(247,246,241,.92)}
.header-inner{max-width:960px;margin:0 auto;padding:0 28px;height:62px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--primary2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--font-disp);font-size:18px;font-weight:900;color:#0b0c10}
html.light .logo-mark{color:#fff}
.logo-name{font-family:var(--font-disp);font-size:1.1rem;font-weight:700;color:var(--text)}
.header-actions{display:flex;align-items:center;gap:12px}
.theme-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.theme-btn:hover{border-color:var(--border3);color:var(--text)}
.user-badge{font-size:12.5px;color:var(--text2);background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:4px 12px;display:flex;align-items:center;gap:6px}
.user-badge-dot{width:7px;height:7px;background:var(--green);border-radius:50%;box-shadow:0 0 6px rgba(110,231,160,.6)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;font-family:var(--font-body);font-size:13.5px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--primary);color:#0b0c10;font-weight:600}
html.light .btn-primary{color:#fff}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-link{background:none;border:none;color:var(--primary);font-size:13px;padding:2px 0;cursor:pointer;font-family:var(--font-body)}
.btn-link:hover{text-decoration:underline}
.btn-sm{padding:6px 12px;font-size:12.5px}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
main{max-width:960px;margin:0 auto;padding:28px 28px 60px}
.loading-state{text-align:center;padding:48px;color:var(--text3);font-family:var(--font-serif);font-style:italic}
.loading-spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-banner{background:rgba(240,112,112,.08);border:1px solid rgba(240,112,112,.25);border-radius:8px;padding:12px 16px;color:var(--red);font-size:13.5px;margin-bottom:16px}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text3);margin-bottom:20px}
.breadcrumb a{color:var(--text2);text-decoration:none}.breadcrumb a:hover{color:var(--primary)}
.search-wrap{position:relative;margin-bottom:0}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-input{width:100%;padding:10px 36px 10px 38px;background:var(--bg2);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--primary)}.search-input::placeholder{color:var(--text3)}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;padding:3px;border-radius:4px;display:flex;align-items:center}
.search-clear:hover{color:var(--text)}
.tabs-list{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border2);border-radius:9px;padding:4px;width:fit-content}
.tab-btn{padding:6px 16px;border-radius:6px;border:none;font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer;background:transparent;color:var(--text2);transition:all .15s}
.tab-btn.active{background:var(--primary);color:#0b0c10}
html.light .tab-btn.active{color:#fff}
.tab-btn:not(.active):hover{background:var(--bg3);color:var(--text)}
.topic-header{padding:24px 0 16px;margin-bottom:4px;border-bottom:1px solid var(--border)}
.topic-icon-big{font-size:2rem;line-height:1}
.topic-name-big{font-family:var(--font-disp);font-size:1.5rem;font-weight:700}
.topic-desc-small{font-size:13.5px;color:var(--text2);margin-top:3px}
.topic-layout{display:grid;grid-template-columns:190px 1fr;gap:20px;align-items:start;margin-top:20px}
@media(max-width:680px){.topic-layout{grid-template-columns:1fr}}
.sidebar{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;position:sticky;top:74px}
.sidebar-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:10px}
.subtopic-btn{display:block;width:100%;text-align:left;padding:8px 10px;border-radius:7px;border:none;background:transparent;color:var(--text2);font-family:var(--font-body);font-size:13px;cursor:pointer;transition:all .15s;margin-bottom:2px}
.subtopic-btn:hover{background:var(--bg3);color:var(--text)}.subtopic-btn.active{background:var(--primary);color:#0b0c10}
html.light .subtopic-btn.active{color:#fff}
.question-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);display:flex;overflow:hidden}
.question-card:hover{background:var(--card-hover);border-color:var(--border3);transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.vote-col{display:flex;flex-direction:column;align-items:center;gap:4px;padding:16px 12px;min-width:54px;border-right:1px solid var(--border)}
.vote-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:6px;transition:all .15s;display:flex;align-items:center}
.vote-btn:hover{color:var(--primary);background:var(--bg3)}
.vote-btn.voted-up{color:var(--green)}.vote-btn.voted-down{color:var(--red)}
.vote-score{font-weight:700;font-size:15px;color:var(--text2);line-height:1;font-family:var(--font-mono)}
.vote-score.positive{color:var(--green)}.vote-score.negative{color:var(--red)}
.intuition-count{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--text3);margin-top:6px;font-family:var(--font-mono)}
.card-content{flex:1;padding:14px 18px;min-width:0}
.card-title{font-family:var(--font-disp);font-size:1rem;font-weight:600;color:var(--text);margin-bottom:5px;line-height:1.4}
.card-about{font-size:13px;color:var(--text2);margin-bottom:8px}.card-about .label{font-weight:600;color:var(--text3);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.tags{display:flex;flex-wrap:wrap;gap:5px}.tag{padding:2px 9px;border-radius:10px;font-size:11.5px;font-weight:500}
.tag-primary{background:rgba(110,231,160,.1);color:var(--green);border:1px solid rgba(110,231,160,.2)}
html.light .tag-primary{background:rgba(30,122,72,.08);border-color:rgba(30,122,72,.2);color:var(--primary)}
.tag-secondary{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.card-meta{font-size:11.5px;color:var(--text3);margin-top:8px;font-family:var(--font-mono)}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;color:var(--text2);font-size:13.5px;font-family:var(--font-body);padding:6px 0;transition:color .15s;margin-bottom:16px}
.back-btn:hover{color:var(--text)}
.detail-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:24px;box-shadow:var(--shadow);overflow:hidden}
.detail-card-inner{display:flex}
.detail-content{flex:1;padding:22px 24px;min-width:0}
.detail-title{font-family:var(--font-disp);font-size:1.5rem;font-weight:700;margin-bottom:10px;line-height:1.3}
.detail-about{color:var(--text2);margin-bottom:12px}.detail-meta{font-size:12.5px;color:var(--text3)}
.sort-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.sort-btns{display:flex;gap:6px}
.sort-btn{padding:5px 13px;border-radius:7px;border:1px solid var(--border2);font-size:12.5px;font-family:var(--font-body);cursor:pointer;background:transparent;color:var(--text2);transition:all .15s}
.sort-btn.active{background:var(--primary);color:#0b0c10;border-color:var(--primary)}
html.light .sort-btn.active{color:#fff}
.sort-btn:not(.active):hover{background:var(--bg3);color:var(--text)}
.i-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden}
.i-card-inner{display:flex}
.i-content{flex:1;padding:16px 18px;min-width:0}
.i-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:4px}
.i-statement{font-family:var(--font-disp);font-size:1rem;font-weight:600;color:var(--text);margin-bottom:10px;line-height:1.4}
.i-explanation{color:var(--text2);font-size:14px;line-height:1.65;white-space:pre-wrap}
.i-example{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:12px;margin-top:10px}
.i-links{margin-top:8px;display:flex;flex-direction:column;gap:4px}
.i-link{font-size:13px;color:var(--primary);text-decoration:none}.i-link:hover{text-decoration:underline}
.i-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--text3);flex-wrap:wrap;gap:8px}
.comment-btn{display:inline-flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;color:var(--text2);font-size:12.5px;font-family:var(--font-body);padding:4px 8px;border-radius:6px;transition:all .15s}
.comment-btn:hover{background:var(--bg3);color:var(--text)}
.comments-section{border-top:1px solid var(--border);padding:14px 18px;background:var(--bg3);display:none}
.comments-section.open{display:block}
.comment-item{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:10px 12px;margin-bottom:8px}
.comment-text{font-size:13.5px;color:var(--text)}.comment-meta{font-size:11.5px;color:var(--text3);margin-top:4px}
.comment-form{display:flex;gap:8px;margin-top:10px;align-items:flex-start}
.comment-input{flex:1;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font-body);font-size:13.5px;resize:none;min-height:60px;outline:none;transition:border-color .15s}
.comment-input:focus{border-color:var(--primary)}.comment-input::placeholder{color:var(--text3)}
.form-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;box-shadow:var(--shadow);margin-top:24px}
.form-title{font-family:var(--font-disp);font-size:1.05rem;font-weight:600;margin-bottom:18px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text3);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
.form-input,.form-textarea,.form-select{width:100%;padding:9px 12px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;transition:border-color .15s}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--primary)}
.form-input::placeholder,.form-textarea::placeholder{color:var(--text3)}
.form-textarea{resize:vertical;min-height:90px}.form-select{appearance:none;cursor:pointer}
.word-count{font-size:11.5px;color:var(--text3);text-align:right;margin-top:4px}.word-count.over{color:var(--red)}
.link-input-row{display:flex;gap:8px}
.link-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.link-item{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:13px}
.link-item a{flex:1;color:var(--primary);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.remove-link-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:2px;transition:color .15s}.remove-link-btn:hover{color:var(--red)}
.form-divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.empty-state{text-align:center;padding:48px 24px;color:var(--text3);font-size:14px;font-family:var(--font-serif);font-style:italic}
.empty-state-icon{font-size:32px;margin-bottom:12px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center;padding:24px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:28px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{margin-bottom:20px}
.modal-title{font-family:var(--font-disp);font-size:1.2rem;font-weight:700}
.modal-subtitle{font-size:13px;color:var(--text2);margin-top:4px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.auth-tabs{display:flex;gap:3px;background:var(--bg3);border-radius:8px;padding:3px;margin-bottom:18px}
.auth-tab{flex:1;padding:7px;border-radius:6px;border:none;font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer;background:transparent;color:var(--text2);transition:all .15s}
.auth-tab.active{background:var(--bg2);color:var(--text);box-shadow:var(--shadow)}
.btn-google{background:var(--bg3);color:var(--text);border:1px solid var(--border2);width:100%;justify-content:center;padding:10px 16px;font-size:14px;border-radius:9px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.btn-google:hover{background:var(--bg4);border-color:var(--primary)}
.divider{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:12px;margin:14px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-msg{padding:9px 13px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none}
.auth-msg.err{background:rgba(240,112,112,.08);border:1px solid rgba(240,112,112,.3);color:var(--red)}
.auth-msg.ok{background:rgba(110,231,160,.08);border:1px solid rgba(110,231,160,.3);color:var(--green)}
.spoiler{display:inline;cursor:pointer;background:var(--text);color:transparent;border-radius:3px;padding:1px 3px;transition:all .2s;user-select:none}
.spoiler.revealed{background:transparent;color:inherit}
.hidden{display:none!important}.tab-content{display:none}.tab-content.active{display:block}
.q-count{font-size:12.5px;color:var(--text3);margin-bottom:12px;font-family:var(--font-mono)}
.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--bg2);border:1px solid var(--border2);border-radius:11px;padding:12px 18px;font-size:13.5px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;animation:toastIn .25s ease;max-width:320px}
.toast.success{border-color:var(--green);color:var(--green)}.toast.error{border-color:var(--red);color:var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@media(max-width:600px){.header-inner{padding:0 18px}main{padding:20px 18px 48px}.detail-title{font-size:1.2rem}}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="index.html">
      <div class="logo-mark">&#8721;</div>
      <span class="logo-name">MINT</span>
    </a>
    <div class="header-actions">
      <button class="theme-btn" id="themeBtn" title="Toggle theme">
        <svg id="iconDark" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="iconLight" class="hidden" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <div class="user-badge hidden" id="userBadge"><span class="user-badge-dot"></span><span id="badgeName"></span></div>
      <button class="btn btn-ghost btn-sm" id="authBtn">Log in</button>
      <button class="btn btn-primary btn-sm" id="postQuestionBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Post a Question
      </button>
    </div>
  </div>
</header>

<!-- LIST VIEW -->
<main id="listView">
  <div class="breadcrumb">
    <a href="index.html">Home</a><span>›</span>
    <span id="breadcrumbCurrent">Topic</span>
  </div>
  <div class="topic-header">
    <div style="display:flex;align-items:center;gap:12px">
      <span class="topic-icon-big" id="topicIcon"></span>
      <div>
        <div class="topic-name-big" id="topicName"></div>
        <div class="topic-desc-small" id="topicDesc"></div>
      </div>
    </div>
  </div>
  <div class="topic-layout">
    <div class="sidebar">
      <div class="sidebar-title">Subtopics</div>
      <div id="subtopicList"></div>
    </div>
    <div>
      <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px">
        <div class="search-wrap" style="flex:1;min-width:160px">

async function loadQuestions() {
  document.getElementById('questionsList').innerHTML = '<div class="loading-state"><div class="loading-spinner"></div>Loading questions...</div>';
  try {
    const { data: tagData, error: te } = await db.from('tags').select('id,name').eq('category', TOPIC_NAME);
    if (te) throw te;
    if (!tagData?.length) { questions=[]; renderQuestions(); return; }
    const { data: qtData, error: qte } = await db.from('question_tags').select('question_id').in('tag_id', tagData.map(t=>t.id));
    if (qte) throw qte;
    if (!qtData?.length) { questions=[]; renderQuestions(); return; }
    const qIds = [...new Set(qtData.map(qt=>qt.question_id))];
    const { data, error } = await db.from('questions')
      .select('id,title,about,created_at,question_tags(tags(name)),intuitions(id),takeaways(id)')
      .in('id',qIds).order('created_at',{ascending:false});
    if (error) throw error;
    questions = (data||[]).map(q=>({
      id:q.id, title:q.title, about:q.about,
      createdAt:timeAgo(q.created_at), createdAtRaw:q.created_at,
      tags:(q.question_tags||[]).map(qt=>qt.tags?.name).filter(Boolean),
      intuitionCount:(q.intuitions||[]).length, takeawayCount:(q.takeaways||[]).length,
      upvotes:0, downvotes:0,
    }));
    const vc = await fetchVoteCounts(qIds,'question');
    questions.forEach(q=>{const v=vc[q.id]||{};q.upvotes=+v.upvotes||0;q.downvotes=+v.downvotes||0;});
    if (currentUser) {
      const { data: vd } = await db.from('votes').select('target_id,direction').eq('user_id',currentUser.id).eq('target_type','question').in('target_id',qIds);
      (vd||[]).forEach(v=>{questionVotes[v.target_id]=v.direction;});
    }
    renderQuestions();
  } catch(e) {
    document.getElementById('questionsList').innerHTML=`<div class="error-banner">Failed to load: ${e.message}</div>`;
  }
}

  document.querySelectorAll('.tab-btn[data-sort]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); currentSort=btn.dataset.sort; renderQuestions();

function sortItems(items, type) {
  const arr=[...items];
  function rel(x){const s=x.upvotes-x.downvotes,h=(Date.now()-new Date(x.createdAtRaw))/3600000;return s*.7+(Math.max(0,24-h)/24)*5;}
  if(type==='top') return arr.sort((a,b)=>(b.upvotes-b.downvotes)-(a.upvotes-a.downvotes));
  if(type==='relevance') return arr.sort((a,b)=>rel(b)-rel(a));
  return arr.sort((a,b)=>new Date(b.createdAtRaw)-new Date(a.createdAtRaw));
}
function renderQuestions() {
  const q=document.getElementById('questionSearch').value.trim().toLowerCase();
  const filtered=questions.filter(x=>{
    const ms=!activeSubtopic||x.tags.includes(activeSubtopic);
    const mq=!q||x.title.toLowerCase().includes(q)||(x.about||'').toLowerCase().includes(q)||x.tags.some(t=>t.toLowerCase().includes(q));
    return ms&&mq;
  });
  const sorted=sortItems(filtered,currentSort);
  document.getElementById('qCount').textContent=`${sorted.length} question${sorted.length!==1?'s':''}${activeSubtopic?` in ${activeSubtopic}`:''}`;
  const container=document.getElementById('questionsList');
  if(!sorted.length){container.innerHTML=`<div class="empty-state"><div class="empty-state-icon">&#128173;</div>No questions yet${activeSubtopic?` in ${activeSubtopic}`:''}. Be the first!</div>`;return;}
  container.innerHTML=sorted.map(q=>questionCardHTML(q)).join('');
  container.querySelectorAll('.katex-render').forEach(el=>renderLatex(el));
  container.querySelectorAll('.question-card').forEach(card => card.addEventListener('click', () => openQuestion(card.dataset.qid)));
  container.querySelectorAll('.vote-btn[data-vid]').forEach(btn => btn.addEventListener('click', e => { e.stopPropagation(); handleVote(btn.dataset.vid, btn.dataset.vdir, 'q'); }));

async function loadDetailItems(qid) {
  const [{data:intData},{data:takData}] = await Promise.all([
    db.from('intuitions').select('id,statement,explanation,example_link,example_explanation,created_at,profiles(username),links(url)').eq('question_id',qid).order('created_at',{ascending:false}),
    db.from('takeaways').select('id,content,created_at,profiles(username),links(url)').eq('question_id',qid).order('created_at',{ascending:false}),
  ]);
  intuitions[qid]=(intData||[]).map(i=>({id:i.id,statement:i.statement,explanation:i.explanation,exampleLink:i.example_link||'',exampleExplanation:i.example_explanation||'',author:i.profiles?.username||'Anonymous',createdAt:timeAgo(i.created_at),createdAtRaw:i.created_at,upvotes:0,downvotes:0,explanationLinks:(i.links||[]).map(l=>l.url),comments:[]}));
  takeaways[qid]=(takData||[]).map(t=>({id:t.id,content:t.content,author:t.profiles?.username||'Anonymous',createdAt:timeAgo(t.created_at),createdAtRaw:t.created_at,upvotes:0,downvotes:0,links:(t.links||[]).map(l=>l.url),comments:[]}));
  const intIds=intuitions[qid].map(i=>i.id), takIds=takeaways[qid].map(t=>t.id);
  const [ivc,tvc]=await Promise.all([fetchVoteCounts(intIds,'intuition'),fetchVoteCounts(takIds,'takeaway')]);
  intuitions[qid].forEach(i=>{const v=ivc[i.id]||{};i.upvotes=+v.upvotes||0;i.downvotes=+v.downvotes||0;});
  takeaways[qid].forEach(t=>{const v=tvc[t.id]||{};t.upvotes=+v.upvotes||0;t.downvotes=+v.downvotes||0;});
  if(currentUser){
    const allIds=[...intIds,...takIds];
    if(allIds.length){const{data:vd}=await db.from('votes').select('target_id,target_type,direction').eq('user_id',currentUser.id).in('target_id',allIds);(vd||[]).forEach(v=>{if(v.target_type==='intuition')intuitionVotes[v.target_id]=v.direction;if(v.target_type==='takeaway')takeawayVotes[v.target_id]=v.direction;});}
  }
}

function addComment(id,type){
  if(!currentUser){openAuthModal();return;}
  const el=document.getElementById(`ctext-${type}-${id}`), text=el?.value.trim(); if(!text) return;
  const comment={id:'c'+(++idCounter),text,author:currentProfile?.username||'You',createdAt:'just now'};
  const list=type==='i'?(intuitions[selectedQuestion.id]||[]):(takeaways[selectedQuestion.id]||[]);
  const item=list.find(x=>x.id===id); if(item){if(!item.comments)item.comments=[];item.comments.push(comment);}
  db.from('comments').insert({parent_id:id,parent_type:type==='i'?'intuition':'takeaway',text,author_id:currentUser.id});
  renderDetailItems();
  setTimeout(()=>document.getElementById(`comments-${type}-${id}`)?.classList.add('open'),10);
}

// ── VOTING ────────────────────────────────────────────────
async function handleVote(id,dir,type){
  if(!currentUser){openAuthModal();return;}
  const vm=type==='q'?questionVotes:type==='i'?intuitionVotes:takeawayVotes;
  const cur=vm[id]??null, next=cur===dir?null:dir;
  const ttype=type==='q'?'question':type==='i'?'intuition':'takeaway';
  const ud=(cur==='up'?-1:0)+(next==='up'?1:0), dd=(cur==='down'?-1:0)+(next==='down'?1:0);
  vm[id]=next;
  const apply=item=>{item.upvotes+=ud;item.downvotes+=dd;};
  if(type==='q'){const q=questions.find(q=>q.id===id);if(q)apply(q);renderQuestions();}
  else if(type==='i'&&selectedQuestion){const i=(intuitions[selectedQuestion.id]||[]).find(x=>x.id===id);if(i)apply(i);renderDetailItems();}
  else if(type==='t'&&selectedQuestion){const t=(takeaways[selectedQuestion.id]||[]).find(x=>x.id===id);if(t)apply(t);renderDetailItems();}
  if(next===null) await db.from('votes').delete().eq('user_id',currentUser.id).eq('target_id',id).eq('target_type',ttype);
  else if(cur===null) await db.from('votes').insert({user_id:currentUser.id,target_id:id,target_type:ttype,direction:next});
  else await db.from('votes').update({direction:next}).eq('user_id',currentUser.id).eq('target_id',id).eq('target_type',ttype);
}

  const links=type==='int'?formState.explanationLinks:formState.takeawayLinks;
  const fn=type==='int'?'removeIntLink':'removeTakLink';
  c.innerHTML=links.map((l,i)=>`<div class="link-item"><a href="${l}" target="_blank" rel="noopener">${l}</a><button class="remove-link-btn" onclick="${fn}(${i})"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>`).join('');
}
async function submitIntuition(){
  if(!currentUser){openAuthModal();return;}
  const stmt=document.getElementById('pf-statement')?.value.trim(), exp=document.getElementById('pf-explanation')?.value.trim();
  if(!stmt||!exp){alert('Please fill in statement and explanation.');return;}
  if(exp.split(/\s+/).filter(Boolean).length>400){alert('Explanation exceeds 400 words.');return;}
  const btn=document.getElementById('pf-submitInt'); btn.disabled=true; btn.textContent='Posting...';
  const{data:d,error:e}=await db.from('intuitions').insert({question_id:selectedQuestion.id,statement:stmt,explanation:exp,example_link:document.getElementById('pf-exampleLink')?.value.trim()||null,example_explanation:document.getElementById('pf-exampleExp')?.value.trim()||null,author_id:currentUser.id}).select('id').single();
  if(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent='Post Intuition';return;}
  if(formState.explanationLinks.length&&d) await db.from('links').insert(formState.explanationLinks.map(url=>({parent_id:d.id,parent_type:'intuition',url})));
  Object.assign(formState,{statement:'',explanation:'',explanationLinks:[],exampleLink:'',exampleExplanation:''});
  await loadDetailItems(selectedQuestion.id); renderDetailItems(); renderPostForm();
  window.scrollTo({top:document.getElementById('dtab-intuitions').offsetTop-80,behavior:'smooth'});
}
async function submitTakeaway(){
  if(!currentUser){openAuthModal();return;}
  const content=document.getElementById('pf-takeaway')?.value.trim(); if(!content){alert('Please write your takeaway.');return;}
  const{data:d,error:e}=await db.from('takeaways').insert({question_id:selectedQuestion.id,content,author_id:currentUser.id}).select('id').single();
  if(e){alert('Error: '+e.message);return;}
  if(formState.takeawayLinks.length&&d) await db.from('links').insert(formState.takeawayLinks.map(url=>({parent_id:d.id,parent_type:'takeaway',url})));
  Object.assign(formState,{takeawayContent:'',takeawayLinks:[]});
  await loadDetailItems(selectedQuestion.id); renderDetailItems(); renderPostForm();
  window.scrollTo({top:document.getElementById('dtab-takeaways').offsetTop-80,behavior:'smooth'});
}

// ── NEW QUESTION MODAL ────────────────────────────────────
function openNewQModal(){
  if(!currentUser){openAuthModal();return;}
  document.getElementById('newQModal').classList.add('open');
}
function closeNewQModal(){
  document.getElementById('newQModal').classList.remove('open');
  document.getElementById('newQTitle').value='';
  document.getElementById('newQAbout').value='';
  document.getElementById('newQSub').value='';
  document.getElementById('newQError').innerHTML='';
  document.getElementById('newQSubmitBtn').disabled=false;
  document.getElementById('newQSubmitBtn').textContent='Post Question';
}
async function submitNewQuestion(){
  const title=document.getElementById('newQTitle').value.trim(), about=document.getElementById('newQAbout').value.trim(), sub=document.getElementById('newQSub').value;
  if(!title||!about){document.getElementById('newQError').innerHTML='<div class="error-banner">Please fill in title and description.</div>';return;}
  const btn=document.getElementById('newQSubmitBtn'); btn.disabled=true; btn.textContent='Posting...';
  const{data:qd,error:qe}=await db.from('questions').insert({title,about}).select('id').single();
  if(qe){document.getElementById('newQError').innerHTML=`<div class="error-banner">${qe.message}</div>`;btn.disabled=false;btn.textContent='Post Question';return;}
  for(const name of(sub?[TOPIC_NAME,sub]:[TOPIC_NAME])){
    let{data:tag}=await db.from('tags').select('id').eq('name',name).maybeSingle();
    if(!tag){const{data:nt}=await db.from('tags').insert({name,category:TOPIC_NAME}).select('id').single();tag=nt;}
    if(tag) await db.from('question_tags').insert({question_id:qd.id,tag_id:tag.id});
  }
  closeNewQModal(); await loadQuestions();
}
</script>
